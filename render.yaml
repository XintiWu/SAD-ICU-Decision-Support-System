services:
  - type: web
    name: sad-frontend-v2-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run api:start
    healthCheckPath: /api/v1/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: sad-frontend-v2-db
          property: connectionString

databases:
  - name: sad-frontend-v2-db
    plan: free
