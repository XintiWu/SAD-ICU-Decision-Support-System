<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>分床配對 — 新介面線框</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f3ef; padding: 24px; color: #1a1f2e; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .sub { color: #5c6578; font-size: 14px; margin-bottom: 20px; }
    .shell { display: grid; grid-template-columns: 1fr 280px; gap: 16px; max-width: 1200px; }
    .panel { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,.08); padding: 16px; }
    .lanes { display: flex; gap: 10px; overflow-x: auto; height: 360px; padding-bottom: 64px; position: relative; }
    .lane { flex: 0 0 200px; background: #faf9f6; border-radius: 12px; border: 1px solid rgba(0,0,0,.08); display: flex; flex-direction: column; }
    .lane-h { padding: 10px; border-bottom: 1px solid rgba(0,0,0,.06); font-size: 13px; font-weight: 700; }
    .lane-b { flex: 1; overflow-y: auto; padding: 8px; font-size: 12px; color: #5c6578; }
    .dock { position: absolute; bottom: 0; left: 0; right: 0; background: #1a1f2e; color: #fff; border-radius: 12px; padding: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>指派分床配對 — 新介面線框</h1>
  <p class="sub">橫向泳道 + 底部投放列 + 右側負荷儀表</p>
  <div class="shell">
    <div class="panel">
      <p style="font-size:12px;color:#5c6578;margin-bottom:12px">橫向捲動所有護理師欄，每欄內獨立垂直捲動</p>
      <div class="lanes">
        <div class="lane"><div class="lane-h">未分配</div><div class="lane-b">（空）</div></div>
        <div class="lane"><div class="lane-h">王小明 · 27</div><div class="lane-b">床 2、床 7 …</div></div>
        <div class="lane"><div class="lane-h">何俊傑 · 17</div><div class="lane-b">床 2 …</div></div>
        <div class="dock">拖曳中：放到 → 王小明 · 陳美麗 · … · 何俊傑</div>
      </div>
    </div>
    <div class="panel">
      <strong>負荷平衡</strong>
      <p style="font-size:13px;color:#5c6578;margin-top:8px">平均 25.3 · 差距 10</p>
      <button style="width:100%;margin-top:16px;padding:10px;background:#1a1f2e;color:#fff;border:none;border-radius:10px">確認送出</button>
    </div>
  </div>
</body>
</html>
